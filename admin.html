<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>予約管理画面</title>
<style>
  body { font-family: sans-serif; max-width: 480px; margin: 0 auto; padding: 16px; background: #f5f5f5; }
  h1 { font-size: 18px; text-align: center; color: #333; margin-bottom: 4px; }
  .subtitle { text-align: center; font-size: 13px; color: #e53935; margin-bottom: 8px; font-weight: bold; }
  .datetime { text-align: center; font-size: 12px; color: #666; margin-bottom: 4px; }
  .stale-warning { display: none; text-align: center; font-size: 13px; color: #e53935; font-weight: bold; margin-bottom: 8px; padding: 8px; background: #fff3f3; border: 1px solid #e53935; border-radius: 8px; }
  .refresh-btn { display: block; margin: 0 auto 12px auto; background: #1976d2; color: white; border: none; padding: 8px 20px; border-radius: 6px; font-size: 14px; cursor: pointer; }
  .month-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .month-nav button { background: #1976d2; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-size: 15px; }
  .month-title { font-size: 17px; font-weight: bold; }
  .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .day-header { text-align: center; font-size: 12px; font-weight: bold; padding: 4px 0; color: #555; }
  .day-header.sun { color: #e53935; }
  .day-header.sat { color: #1976d2; }
  .day { border-radius: 8px; padding: 6px 2px; text-align: center; font-size: 13px; min-height: 52px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; gap: 2px; }
  .day.empty { background: transparent; }
  .day.hidden { background: #f0f0f0; border: 1px solid #e0e0e0; }
  .day.available { background: white; border: 1px solid #ddd; cursor: pointer; }
  .day.available:active { background: #e3f2fd; }
  .day.reserved { background: #fff9c4; border: 2px solid #f9a825; cursor: pointer; }
  .day.confirmed { background: #e8f5e9; border: 2px solid #43a047; cursor: pointer; }
  .day.past { background: #f0f0f0; color: #bbb; }
  .day-num { font-size: 14px; font-weight: bold; }
  .day-num.sun { color: #e53935; }
  .day-num.sat { color: #1976d2; }
  .day-num.past { color: #bbb; }
  .status-badge { font-size: 10px; padding: 2px 4px; border-radius: 4px; }
  .badge-available { color: #43a047; font-size: 14px; }
  .badge-reserved { background: #f9a825; color: white; }
  .badge-confirmed { background: #43a047; color: white; }
  .legend { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; font-size: 12px; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-box { width: 14px; height: 14px; border-radius: 3px; }
  .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; }
  .modal-box { background: white; margin: 15% auto; padding: 24px; border-radius: 12px; width: 85%; max-width: 320px; }
  .modal-title { font-size: 17px; font-weight: bold; margin-bottom: 8px; }
  .modal-date { font-size: 15px; color: #555; margin-bottom: 8px; }
  .modal-info { font-size: 13px; color: #888; margin-bottom: 16px; white-space: pre-line; }
  .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 16px; margin-bottom: 8px; cursor: pointer; }
  .btn-publish { background: #1976d2; color: white; }
  .btn-unpublish { background: #757575; color: white; }
  .btn-reserve { background: #1976d2; color: white; }
  .btn-confirm { background: #43a047; color: white; }
  .btn-cancel { background: #e53935; color: white; }
  .btn-close { background: #eee; color: #333; }
  .processing { display: none; text-align: center; padding: 12px; color: #1976d2; font-size: 14px; font-weight: bold; }
  .memo-section { margin-top: 24px; background: white; border-radius: 12px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .memo-title { font-size: 15px; font-weight: bold; color: #333; margin-bottom: 8px; }
  .memo-textarea { width: 100%; height: 180px; border: 1px solid #ddd; border-radius: 8px; padding: 10px; font-size: 14px; resize: vertical; box-sizing: border-box; font-family: sans-serif; }
  .memo-btn { margin-top: 8px; padding: 10px; width: 100%; background: #1976d2; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
  .memo-saved { text-align: center; font-size: 12px; color: #43a047; margin-top: 4px; display: none; }
</style>
</head>
<body>

<h1>📅 予約管理画面</h1>
<div class="subtitle">⚠️ カワムラさん専用</div>
<div class="datetime" id="datetime"></div>

<!-- 5分経ったら表示される警告 -->
<div class="stale-warning" id="staleWarning">
  ⚠️ 情報が古い可能性があります。更新してください。
</div>
<button class="refresh-btn" id="refreshBtn" onclick="refreshCalendar()" style="display:none">🔄 更新する</button>

<div class="legend">
  <div class="legend-item"><div class="legend-box" style="background:#f0f0f0;border:1px solid #e0e0e0"></div>非公開</div>
  <div class="legend-item"><div class="legend-box" style="background:white;border:1px solid #ddd"></div>空き（公開中）</div>
  <div class="legend-item"><div class="legend-box" style="background:#fff9c4;border:2px solid #f9a825"></div>仮押さえ</div>
  <div class="legend-item"><div class="legend-box" style="background:#e8f5e9;border:2px solid #43a047"></div>確定済</div>
</div>

<div class="month-nav">
  <button onclick="changeMonth(-1)">◀</button>
  <div class="month-title" id="monthTitle"></div>
  <button onclick="changeMonth(1)">▶</button>
</div>

<div class="calendar" id="calendar">
  <div style="text-align:center;padding:32px;color:#999;grid-column:span 7">読み込み中...</div>
</div>

<div class="processing" id="processing">⏳ 処理中です。しばらくお待ちください...</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-date" id="modalDate"></div>
    <div class="modal-info" id="modalInfo"></div>
    <div id="modalButtons"></div>
    <button class="btn btn-close" onclick="closeModal()">閉じる</button>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzlW4CxmKXfZcwvzcZMcLzPdfxR1rkyLfsBOHM55UyEMiYu45fEaPPukb-m49LRhGdb/exec';
const COMPANY_ID = 'admin';

let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth();
let calendarData = [];
let selectedDate = '';
let isProcessing = false;
let lastLoadTime = null; // データを読み込んだ時刻
let staleTimer = null;   // 5分タイマー

// 読み込み時刻を表示する
function updateDatetimeDisplay() {
  if (!lastLoadTime) return;
  const t = lastLoadTime;
  const str = `${t.getFullYear()}年${t.getMonth()+1}月${t.getDate()}日 ${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;
  document.getElementById('datetime').textContent = `${str} 時点の情報`;
}

// 5分経ったら警告を表示する
function startStaleTimer() {
  // 前のタイマーがあればリセット
  if (staleTimer) clearTimeout(staleTimer);
  // 警告を隠す
  document.getElementById('staleWarning').style.display = 'none';
  document.getElementById('refreshBtn').style.display = 'none';

  // 5分後に警告を表示
  staleTimer = setTimeout(() => {
    document.getElementById('staleWarning').style.display = 'block';
    document.getElementById('refreshBtn').style.display = 'block';
  }, 5 * 60 * 1000);
}

// 更新ボタンを押したとき
async function refreshCalendar() {
  await loadCalendar();
}

async function loadCalendar() {
  try {
    const res = await fetch(`${GAS_URL}?action=getCalendar&companyId=${COMPANY_ID}`);
    const json = await res.json();
    if (json.success) {
      calendarData = json.calendar;
      lastLoadTime = new Date(); // 読み込んだ時刻を記録
      updateDatetimeDisplay();
      startStaleTimer();        // タイマーをリセット
      renderCalendar();
    }
  } catch(e) {
    document.getElementById('calendar').innerHTML = '<div style="text-align:center;padding:32px;color:#e53935;grid-column:span 7">読み込みエラー。再読み込みしてください。</div>';
  }
}

function renderCalendar() {
  const cal = document.getElementById('calendar');
  const title = document.getElementById('monthTitle');
  title.textContent = `${currentYear}年${currentMonth + 1}月`;

  const dayHeaders = ['日','月','火','水','木','金','土'];
  const headerClasses = ['sun','','','','','','sat'];
  let html = dayHeaders.map((d,i) => `<div class="day-header ${headerClasses[i]}">${d}</div>`).join('');

  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const today = new Date();

  for (let i = 0; i < firstDay; i++) html += '<div class="day empty"></div>';

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayOfWeek = new Date(currentYear, currentMonth, d).getDay();
    const isPast = new Date(currentYear, currentMonth, d) < new Date(today.getFullYear(), today.getMonth(), today.getDate());
    const numClass = dayOfWeek === 0 ? 'sun' : dayOfWeek === 6 ? 'sat' : '';

    const info = calendarData.find(c => c.date === dateStr);
    const status = info ? info.status : '非公開';

    let dayClass = 'hidden';
    let badge = '';

    if (isPast) {
      dayClass = 'past';
    } else if (status === '確定') {
      dayClass = 'confirmed';
      badge = '<span class="status-badge badge-confirmed">確定</span>';
    } else if (status === '仮押さえ') {
      dayClass = 'reserved';
      badge = '<span class="status-badge badge-reserved">仮押さえ</span>';
    } else if (status === '空き') {
      dayClass = 'available';
      badge = '<span class="status-badge badge-available">○</span>';
    } else {
      dayClass = 'hidden';
    }

    const onclick = isPast ? '' : `onclick="openModal('${dateStr}')"`;

    html += `<div class="day ${dayClass}" ${onclick}>
      <span class="day-num ${isPast ? 'past' : numClass}">${d}</span>
      ${badge}
    </div>`;
  }

  cal.innerHTML = html;
}

function changeMonth(diff) {
  currentMonth += diff;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  renderCalendar();
}

function openModal(dateStr) {
  selectedDate = dateStr;
  const info = calendarData.find(c => c.date === dateStr);
  const status = info ? info.status : '非公開';
  const [y, m, d] = dateStr.split('-');
  document.getElementById('modalDate').textContent = `${y}年${m}月${d}日`;

  let infoText = '';
  let buttons = '';

  if (status === '非公開') {
    infoText = '状態：非公開（元請け画面に表示されていません）';
    buttons = `<button class="btn btn-publish" onclick="doAction('publish')">✅ 空きとして公開する</button>`;
  } else if (status === '空き') {
    infoText = '状態：空き（元請け画面に○表示中）';
    buttons = `
      <button class="btn btn-confirm" onclick="doAction('confirm')">✅ 依頼確定する</button>
      <button class="btn btn-reserve" onclick="doAction('reserve')">📌 仮押さえする</button>
      <button class="btn btn-unpublish" onclick="doAction('unpublish')">🚫 非公開に戻す</button>
    `;
  } else if (status === '仮押さえ') {
    infoText = `状態：仮押さえ中\n会社：${info.reservedBy || ''}`;
    buttons = `
      <button class="btn btn-confirm" onclick="doAction('confirm')">✅ 依頼確定する</button>
      <button class="btn btn-cancel" onclick="doAction('cancel')">❌ 仮押さえを取消す</button>
    `;
  } else if (status === '確定') {
    infoText = '状態：確定済み';
    buttons = `<button class="btn btn-cancel" onclick="doAction('cancel')">❌ 確定を取消す</button>`;
  }

  document.getElementById('modalTitle').textContent = 'この日を操作する';
  document.getElementById('modalInfo').textContent = infoText;
  document.getElementById('modalButtons').innerHTML = buttons;
  document.getElementById('modal').style.display = 'block';
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

function showProcessing() {
  isProcessing = true;
  document.getElementById('processing').style.display = 'block';
}

function hideProcessing() {
  isProcessing = false;
  document.getElementById('processing').style.display = 'none';
}

async function doAction(action) {
  if (isProcessing) return;
  closeModal();
  showProcessing();
  try {
    const res = await fetch(`${GAS_URL}?action=${action}&companyId=${COMPANY_ID}&date=${selectedDate}`);
    const json = await res.json();
    hideProcessing();
    alert(json.message);
    if (json.success) {
      await loadCalendar();
    }
  } catch(e) {
    hideProcessing();
    alert('通信エラーが発生しました。もう一度お試しください。');
  }
}

loadCalendar();
</script>

<div class="memo-section">
  <div class="memo-title">📝 カワムラメモ</div>
  <textarea class="memo-textarea" id="memoText" placeholder="入ってきそうな物件名など、メモしておきたいことを書いてね"></textarea>
  <button class="memo-btn" onclick="saveMemo()">💾 保存する</button>
  <div class="memo-saved" id="memoSaved">✅ 保存しました！</div>
</div>

<script>
const savedMemo = localStorage.getItem('kawamura_memo');
if (savedMemo) document.getElementById('memoText').value = savedMemo;

function saveMemo() {
  localStorage.setItem('kawamura_memo', document.getElementById('memoText').value);
  const msg = document.getElementById('memoSaved');
  msg.style.display = 'block';
  setTimeout(() => msg.style.display = 'none', 2000);
}
</script>
</body>
</html>
